name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-theme
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://github.com/sky0926a/botpilot-theme/releases/latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build library
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: List produced artifacts
        env:
          ARTIFACT_GLOB: "*.tgz"
        run: ls -lh ${ARTIFACT_GLOB}

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_NUMBER: ${{ github.run_number }}
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          date_part=$(date +%Y.%m.%d)
          tag="v${date_part}.${RUN_NUMBER}"
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git tag "${tag}" "${DEPLOYED_SHA}" -m "Auto-tag from release workflow run ${RUN_NUMBER}"
          git push origin "${tag}"
          gh release create "${tag}" \
            --target main \
            --title "${tag}" \
            --generate-notes \
            *.tgz
          echo "::notice::Released ${tag} with tarball attached"
